    function buildArena() {
      const rng = mulberry32(hashString(roomId));
      const groundGeo = new THREE.PlaneGeometry(600, 600, 132, 132);
      groundGeo.rotateX(-Math.PI / 2);

      for (let i = 0; i < groundGeo.attributes.position.count; i += 1) {
        const x = groundGeo.attributes.position.getX(i);
        const z = groundGeo.attributes.position.getZ(i);
        const y = terrainHeightAt(x, z) + rng() * 0.08;
        groundGeo.attributes.position.setY(i, y);
      }

      groundGeo.computeVertexNormals();

      const ground = new THREE.Mesh(
        groundGeo,
        new THREE.MeshStandardMaterial({ color: 0x3d9250, roughness: 0.95 })
      );
      ground.receiveShadow = true;
      scene.add(ground);

      const ringGeo = new THREE.TorusGeometry(95, 0.14, 8, 96);
      const ringMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.28 });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.rotation.x = Math.PI / 2;
      ring.position.y = 0.12;
      scene.add(ring);

      obstacleLayout.forEach((obstacle, index) => {
        if (obstacle.type === "platform") {
          const platform = new THREE.Mesh(
            new THREE.BoxGeometry(obstacle.w, 0.7, obstacle.d),
            new THREE.MeshStandardMaterial({ color: 0x6d716d, roughness: 0.9 })
          );
          platform.position.set(obstacle.x, obstacle.y + obstacle.height - 0.35, obstacle.z);
          platform.castShadow = true;
          platform.receiveShadow = true;
          scene.add(platform);

          const parapetMat = new THREE.MeshStandardMaterial({ color: 0x858981, roughness: 0.94 });
          const long = new THREE.BoxGeometry(obstacle.w, 1.2, 1.4);
          const short = new THREE.BoxGeometry(1.4, 1.2, obstacle.d);
          [
            { x: 0, z: -obstacle.d / 2, geo: long },
            { x: 0, z: obstacle.d / 2, geo: long },
            { x: -obstacle.w / 2, z: 0, geo: short },
            { x: obstacle.w / 2, z: 0, geo: short }
          ].forEach((edge) => {
            const rail = new THREE.Mesh(edge.geo, parapetMat);
            rail.position.set(obstacle.x + edge.x, obstacle.y + obstacle.height + 0.6, obstacle.z + edge.z);
            rail.castShadow = true;
            rail.receiveShadow = true;
            scene.add(rail);
          });
          return;
        }

        if (obstacle.type === "jumpPad") {
          const group = new THREE.Group();
          group.position.set(obstacle.x, obstacle.y, obstacle.z);
          const ringMat = new THREE.MeshStandardMaterial({
            color: 0x4fb4ff,
            emissive: 0x1a6aa8,
            emissiveIntensity: 0.45,
            roughness: 0.38,
            metalness: 0.15
          });
          const disc = new THREE.Mesh(
            new THREE.CylinderGeometry(obstacle.radius, obstacle.radius * 0.94, 0.28, 40),
            ringMat
          );
          disc.position.y = 0.14;
          disc.castShadow = true;
          disc.receiveShadow = true;
          group.add(disc);
          const ring = new THREE.Mesh(
            new THREE.TorusGeometry(obstacle.radius * 0.82, 0.07, 10, 56),
            new THREE.MeshStandardMaterial({ color: 0xffe27a, emissive: 0xffb347, emissiveIntensity: 0.25, roughness: 0.35 })
          );
          ring.rotation.x = Math.PI / 2;
          ring.position.y = 0.26;
          group.add(ring);
          scene.add(group);
          return;
        }

        if (obstacle.type === "wall") {
          const wall = new THREE.Mesh(
            new THREE.BoxGeometry(obstacle.w > obstacle.d ? 8 : 6, obstacle.height, obstacle.d > obstacle.w ? 8 : 6),
            new THREE.MeshStandardMaterial({ color: 0x7b7d7a, roughness: 0.92 })
          );
          wall.position.set(obstacle.x, obstacle.y + obstacle.height / 2, obstacle.z);
          wall.castShadow = true;
          wall.receiveShadow = true;
          scene.add(wall);
          if (index % 3 === 0) {
            const crenel = new THREE.Mesh(
              new THREE.BoxGeometry(obstacle.w > obstacle.d ? 4.2 : 3.2, 1.1, obstacle.d > obstacle.w ? 4.2 : 3.2),
              new THREE.MeshStandardMaterial({ color: 0x8d908b, roughness: 0.95 })
            );
            crenel.position.set(obstacle.x, obstacle.y + obstacle.height + 0.55, obstacle.z);
            crenel.castShadow = true;
            scene.add(crenel);
          }
          return;
        }

        if (obstacle.type === "tower") {
          const tower = new THREE.Mesh(
            new THREE.CylinderGeometry(obstacle.radius, obstacle.radius * 1.08, obstacle.height, 18),
            new THREE.MeshStandardMaterial({ color: 0x747772, roughness: 0.9 })
          );
          tower.position.set(obstacle.x, obstacle.y + obstacle.height / 2, obstacle.z);
          tower.castShadow = true;
          tower.receiveShadow = true;
          scene.add(tower);
          const roof = new THREE.Mesh(
            new THREE.ConeGeometry(obstacle.radius * 1.12, obstacle.radius * 0.9, 18),
            new THREE.MeshStandardMaterial({ color: 0x46515b, roughness: 0.84 })
          );
          roof.position.set(obstacle.x, obstacle.y + obstacle.height + obstacle.radius * 0.45, obstacle.z);
          roof.castShadow = true;
          scene.add(roof);
          return;
        }

        if (obstacle.type === "tree") {
          const trunk = new THREE.Mesh(
            new THREE.CylinderGeometry(0.48, 0.72, obstacle.trunkHeight, 9),
            new THREE.MeshStandardMaterial({ color: 0x805438, roughness: 0.9 })
          );
          trunk.position.set(obstacle.x, obstacle.y + obstacle.trunkHeight / 2, obstacle.z);
          trunk.castShadow = true;
          scene.add(trunk);

          const top = new THREE.Mesh(
            new THREE.SphereGeometry(obstacle.canopyRadius, 12, 12),
            new THREE.MeshStandardMaterial({ color: index % 2 ? 0x2e9d5b : 0x277c68, roughness: 0.85 })
          );
          top.position.set(obstacle.x, obstacle.y + obstacle.trunkHeight + obstacle.canopyRadius * 0.65, obstacle.z);
          top.castShadow = true;
          scene.add(top);
          return;
        }

        if (obstacle.type === "crate") {
          const crate = new THREE.Mesh(
            new THREE.BoxGeometry(3.5, 2.2, 3.5),
            new THREE.MeshStandardMaterial({ color: index % 2 ? 0x697783 : 0x8a6f4f, roughness: 0.82 })
          );
          crate.position.set(obstacle.x, obstacle.y + 1.1, obstacle.z);
          crate.rotation.y = obstacle.angle;
          crate.castShadow = true;
          crate.receiveShadow = true;
          scene.add(crate);
          return;
        }

        const rock = new THREE.Mesh(
          new THREE.DodecahedronGeometry(obstacle.size, 0),
          new THREE.MeshStandardMaterial({ color: index % 2 ? 0x72746f : 0x56636d, roughness: 0.96 })
        );
        rock.position.set(obstacle.x, obstacle.y + obstacle.height * 0.5, obstacle.z);
        rock.scale.y = obstacle.scaleY;
        rock.rotation.set(obstacle.rx, obstacle.ry, obstacle.rz);
        rock.castShadow = true;
        rock.receiveShadow = true;
        scene.add(rock);
      });
    }

    function terrainHeightAt(x, z) {
      return (
        Math.sin(x * 0.018) * 0.62 +
        Math.cos(z * 0.021) * 0.52 +
        Math.sin((x + z) * 0.012) * 0.35 +
        Math.cos(Math.hypot(x, z) * 0.018) * 0.45
      );
    }

    function walkableHeightAt(x, z, obstacles = obstacleLayout, eyeY = Infinity) {
      let height = terrainHeightAt(x, z);
      for (const obstacle of obstacles) {
        if (obstacle.type !== "platform") continue;
        const insideX = Math.abs(x - obstacle.x) <= obstacle.w / 2;
        const insideZ = Math.abs(z - obstacle.z) <= obstacle.d / 2;
        if (!insideX || !insideZ) continue;
        const top = obstacle.y + obstacle.height;
        if (eyeY < top + 1.1) continue;
        if (top > height) height = top;
      }
      return height;
    }

    function activeJumpPad() {
      const footY = yaw.position.y - 2;
      for (const obstacle of obstacleLayout) {
        if (obstacle.type !== "jumpPad") continue;
        const dx = yaw.position.x - obstacle.x;
        const dz = yaw.position.z - obstacle.z;
        if (Math.hypot(dx, dz) > obstacle.radius) continue;
        const top = obstacle.y + 0.12;
        if (footY >= top - 0.85 && footY <= top + 1.45) return obstacle;
      }
      return null;
    }

    function buildObstacleLayout(roomId) {
      const rng = mulberry32(hashString(roomId));
      const obstacles = [];

      const platforms = [
        { x: 0, z: 0, w: 46, d: 46, height: 12 },
        { x: 0, z: -125, w: 72, d: 18, height: 7.2 },
        { x: 0, z: 125, w: 72, d: 18, height: 7.2 },
        { x: -125, z: 0, w: 18, d: 72, height: 7.2 },
        { x: 125, z: 0, w: 18, d: 72, height: 7.2 },
        { x: -62, z: -62, w: 38, d: 24, height: 5.4 },
        { x: 62, z: 62, w: 38, d: 24, height: 5.4 },
        { x: -62, z: 62, w: 24, d: 38, height: 5.4 },
        { x: 62, z: -62, w: 24, d: 38, height: 5.4 }
      ];

      for (const platform of platforms) {
        obstacles.push({
          type: "platform",
          x: platform.x,
          z: platform.z,
          y: terrainHeightAt(platform.x, platform.z),
          radius: Math.hypot(platform.w, platform.d) / 2,
          height: platform.height,
          w: platform.w,
          d: platform.d
        });
      }

      const jumpPads = [
        { x: 23, z: 0, boost: 28 },
        { x: -23, z: 0, boost: 28 },
        { x: 0, z: -116, boost: 24 },
        { x: 0, z: 116, boost: 24 },
        { x: -116, z: 0, boost: 24 },
        { x: 116, z: 0, boost: 24 },
        { x: -62, z: -48, boost: 22 },
        { x: 62, z: 48, boost: 22 }
      ];

      for (const jp of jumpPads) {
        const gy = terrainHeightAt(jp.x, jp.z);
        obstacles.push({
          type: "jumpPad",
          x: jp.x,
          z: jp.z,
          y: gy,
          radius: 2.85,
          boost: jp.boost
        });
      }

      const wallSegments = [
        { x: 0, z: -125, w: 150, d: 10 },
        { x: 0, z: 125, w: 150, d: 10 },
        { x: -125, z: 0, w: 10, d: 150 },
        { x: 125, z: 0, w: 10, d: 150 },
        { x: -62, z: -62, w: 44, d: 9 },
        { x: 62, z: 62, w: 44, d: 9 },
        { x: -62, z: 62, w: 9, d: 44 },
        { x: 62, z: -62, w: 9, d: 44 }
      ];

      for (const segment of wallSegments) {
        const steps = Math.max(2, Math.ceil(Math.max(segment.w, segment.d) / 8));
        for (let i = 0; i < steps; i += 1) {
          const t = steps === 1 ? 0.5 : i / (steps - 1);
          const x = segment.x + (t - 0.5) * segment.w;
          const z = segment.z + (t - 0.5) * segment.d;
          obstacles.push({
            type: "wall",
            x,
            z,
            y: terrainHeightAt(x, z),
            radius: 4.4,
            height: 7,
            w: segment.w,
            d: segment.d
          });
        }
      }

      const towers = [
        [-125, -125], [125, -125], [-125, 125], [125, 125],
        [-62, -62], [62, 62], [-62, 62], [62, -62],
        [0, 0]
      ];
      for (const [x, z] of towers) {
        obstacles.push({
          type: "tower",
          x,
          z,
          y: terrainHeightAt(x, z),
          radius: x === 0 && z === 0 ? 12 : 8,
          height: x === 0 && z === 0 ? 18 : 12
        });
      }

      for (let i = 0; i < 90; i += 1) {
        const angle = rng() * Math.PI * 2;
        const radius = 30 + rng() * 230;
        const x = Math.cos(angle) * radius;
        const z = Math.sin(angle) * radius;
        if (Math.abs(x) < 12 && Math.abs(z) < 12) continue;

        const trunkHeight = 2.8 + rng() * 1.6;
        const canopyRadius = 1.25 + rng() * 0.85;
        obstacles.push({
          type: "tree",
          x,
          z,
          y: terrainHeightAt(x, z),
          radius: Math.max(0.85, canopyRadius * 0.62),
          height: trunkHeight + canopyRadius + 1.2,
          trunkHeight,
          canopyRadius
        });
      }

      for (let i = 0; i < 16; i += 1) {
        const angle = (i / 16) * Math.PI * 2;
        const radius = 42 + (i % 4) * 16;
        const x = Math.cos(angle) * radius;
        const z = Math.sin(angle) * radius;
        obstacles.push({
          type: "crate",
          x,
          z,
          y: terrainHeightAt(x, z),
          radius: 2.45,
          height: 2.4,
          angle
        });
      }

      for (let i = 0; i < 18; i += 1) {
        const angle = rng() * Math.PI * 2;
        const radius = 26 + rng() * 140;
        const x = Math.cos(angle) * radius;
        const z = Math.sin(angle) * radius;
        const size = 1.5 + rng() * 2.8;
        const scaleY = 0.55 + rng() * 0.9;
        obstacles.push({
          type: "rock",
          x,
          z,
          y: terrainHeightAt(x, z),
          radius: size * 0.85,
          height: Math.max(1.2, size * scaleY),
          size,
          scaleY,
          rx: rng() * 2,
          ry: rng() * 2,
          rz: rng() * 2
        });
      }

      return obstacles;
    }

    function renderPlayers(players) {
      const sorted = [...players].sort((a, b) => b.kills - a.kills || a.deaths - b.deaths);
      playersEl.innerHTML = "";

      sorted.forEach((player) => {
        const row = document.createElement("div");
        row.className = "playerRow";
        row.style.color = player.color;
        row.innerHTML = `
          <span class="swatch"></span>
          <span class="playerName">${escapeHtml(player.name)}${player.id === myId ? " (you)" : ""}</span>
          <span class="playerScore">${player.kills}/${player.deaths}</span>
        `;
        playersEl.appendChild(row);
      });
    }

    function renderMatch(match) {
      if (!match) return;
      matchState = match;
      const isCoop = match.mode === "coop";

      matchPanelEl.classList.toggle("coop", isCoop);
      playersPanelTitleEl.textContent = isCoop ? "Squad" : "Players";

      killLimitEl.style.display = isCoop ? "none" : "";
      coopWaveRowEl.style.display = isCoop ? "inline" : "none";
      coopLifeRowEl.style.display = isCoop ? "inline" : "none";
      coopCreditRowEl.style.display = isCoop ? "inline" : "none";
      coopChaosRowEl.style.display = isCoop ? "inline" : "none";
      coopChaosBarEl.style.display = isCoop ? "flex" : "none";
      coopComboRowEl.style.display = isCoop ? "inline" : "none";

      if (isCoop) {
        coopWaveEl.textContent = String(match.wave || 0);
        coopLivesEl.textContent = `${match.lives}/${match.maxLives}`;
        coopCreditsEl.textContent = String(match.credits ?? 0);
        coopComboEl.textContent = String(match.combo ?? 0);
        const cm = match.chaosMeter ?? 0;
        chaosFillEl.style.width = `${Math.min(100, cm)}%`;
        roundInfoEl.textContent = match.mutatorLabel || "Mayhem co-op";
        roundInfoEl.style.display = "";
        updateMatchClock();
        return;
      }

      roundInfoEl.textContent = `Round ${match.round}`;
      killLimitEl.textContent = `${match.killLimit} kills`;
      killLimitEl.style.display = "";
      updateMatchClock();
    }

    function updateMatchClock() {
      if (!matchState) return;
      const now = Date.now();

      if (matchState.mode === "coop") {
        if (matchState.phase === "between" && matchState.breakEndsAt) {
          const seconds = Math.max(0, Math.ceil((matchState.breakEndsAt - now) / 1000));
          matchTimerEl.textContent = `Loot break ${seconds}s`;
        } else if (matchState.phase === "gameover" && matchState.restartAt) {
          const seconds = Math.max(0, Math.ceil((matchState.restartAt - now) / 1000));
          matchTimerEl.textContent = `Restart ${seconds}s`;
        } else {
          matchTimerEl.textContent = `${matchState.enemiesLeft ?? 0} bots`;
        }
        return;
      }

      if (matchState.phase === "ended") {
        const seconds = Math.max(0, Math.ceil((matchState.restartAt - now) / 1000));
        matchTimerEl.textContent = `Restart ${seconds}`;
        return;
      }

      const secondsLeft = Math.max(0, Math.ceil((matchState.endsAt - now) / 1000));
      const minutes = Math.floor(secondsLeft / 60);
      const seconds = String(secondsLeft % 60).padStart(2, "0");
      matchTimerEl.textContent = `${minutes}:${seconds}`;
    }

    function renderBossHud(boss) {
      if (!boss || !boss.alive) {
        bossPanelEl.classList.remove("visible");
        return;
      }

      bossPanelEl.classList.add("visible");
      bossNameEl.textContent = `${boss.name} ${boss.hp}/${boss.maxHp}`;
      bossFillEl.style.width = `${clamp((boss.hp / boss.maxHp) * 100, 0, 100)}%`;
    }

    function updateBoostHud() {
      const now = Date.now();
      const me = playerStates.get(myId);
      if (!me) return;

      const boosts = [];
      if (me.armorUntil > now) boosts.push(`Armor ${Math.ceil((me.armorUntil - now) / 1000)}s`);
      if (me.speedBoostUntil > now) boosts.push(`Speed ${Math.ceil((me.speedBoostUntil - now) / 1000)}s`);
      if (me.damageBoostUntil > now) boosts.push(`Damage ${Math.ceil((me.damageBoostUntil - now) / 1000)}s`);
      if (me.jumpBoostUntil > now) boosts.push(`Jump ${Math.ceil((me.jumpBoostUntil - now) / 1000)}s`);
      if (me.streak >= 3 && me.revealUntil > now) boosts.push(`Reveal ${Math.ceil((me.revealUntil - now) / 1000)}s`);

      boostPanelEl.textContent = boosts.join(" | ");
      boostPanelEl.classList.toggle("visible", boosts.length > 0);
    }

    function renderMinimap() {
      const size = minimapEl.width;
      const half = size / 2;
      const scale = size / 600;
      minimapCtx.clearRect(0, 0, size, size);
      minimapCtx.fillStyle = "rgba(5, 9, 13, 0.78)";
      minimapCtx.fillRect(0, 0, size, size);
      minimapCtx.fillStyle = "rgba(68, 96, 64, 0.5)";
      minimapCtx.fillRect(10, 10, size - 20, size - 20);
      minimapCtx.strokeStyle = "rgba(255,255,255,0.18)";
      minimapCtx.strokeRect(0.5, 0.5, size - 1, size - 1);
      minimapCtx.strokeStyle = "rgba(255,255,255,0.12)";
      for (let i = 1; i < 4; i += 1) {
        const pos = (size / 4) * i;
        minimapCtx.beginPath();
        minimapCtx.moveTo(pos, 0);
        minimapCtx.lineTo(pos, size);
        minimapCtx.moveTo(0, pos);
        minimapCtx.lineTo(size, pos);
        minimapCtx.stroke();
      }

      const plot = (x, z, color, radius = 3) => {
        const px = half + x * scale;
        const py = half + z * scale;
        if (px < 0 || px > size || py < 0 || py > size) return;
        minimapCtx.fillStyle = color;
        minimapCtx.beginPath();
        minimapCtx.arc(px, py, radius, 0, Math.PI * 2);
        minimapCtx.fill();
      };

      obstacleLayout.forEach((obstacle, index) => {
        if (obstacle.type === "wall" || obstacle.type === "tower") {
          plot(obstacle.x, obstacle.z, "rgba(205,205,190,0.72)", obstacle.type === "tower" ? 3.5 : 2.2);
        } else if (obstacle.type === "jumpPad") {
          plot(obstacle.x, obstacle.z, "rgba(79,180,255,0.85)", 2.6);
        } else if (index % 5 === 0) {
          plot(obstacle.x, obstacle.z, "rgba(35,95,55,0.65)", 1.5);
        }
      });
      latestPickups.forEach((pickup) => {
        const x = half + pickup.position.x * scale;
        const y = half + pickup.position.z * scale;
        minimapCtx.fillStyle = pickup.type === "boost" ? "#58d68d" : pickup.type === "nuke" ? "#ff3d2e" : "#ffcf5a";
        minimapCtx.fillRect(x - 2.5, y - 2.5, 5, 5);
      });
      latestBots.forEach((bot) => plot(bot.position.x, bot.position.z, bot.color || "#7bff8c", 3.2));
      if (latestBoss) plot(latestBoss.position.x, latestBoss.position.z, "#ff3d2e", 5);
      latestPlayers.forEach((player) => {
        if (!player.alive) return;
        plot(player.position.x, player.position.z, player.id === myId ? "#ffffff" : player.color, player.id === myId ? 4 : 3);
      });

      minimapCtx.save();
      minimapCtx.translate(half, half);
      minimapCtx.rotate(-yaw.rotation.y);
      minimapCtx.fillStyle = "#ffffff";
      minimapCtx.beginPath();
      minimapCtx.moveTo(0, -8);
      minimapCtx.lineTo(5, 5);
      minimapCtx.lineTo(-5, 5);
      minimapCtx.closePath();
      minimapCtx.fill();
      minimapCtx.restore();

      minimapCtx.fillStyle = "rgba(255,255,255,0.72)";
      minimapCtx.font = "700 10px Arial";
      minimapCtx.fillText("CASTLE", 10, 16);
    }

    function showHitMarker(headshot) {
      hitMarkerTimer = headshot ? 0.18 : 0.1;
      hitMarkerEl.classList.add("visible");
      hitMarkerEl.style.transform = headshot ? "scale(1.25)" : "";
    }

    function updateHitMarker(dt) {
      if (hitMarkerTimer <= 0) return;
      hitMarkerTimer -= dt;
      if (hitMarkerTimer <= 0) {
        hitMarkerEl.classList.remove("visible");
        hitMarkerEl.style.transform = "";
      }
    }

    function updateScope(dt) {
      const scopedWeapon = currentWeapon === "sniper";
      const adsFov = scopedWeapon ? 24 : currentWeapon === "pistol" ? 58 : 48;
      targetFov = aiming ? adsFov : 75;
      camera.fov += (targetFov - camera.fov) * Math.min(1, dt * 12);
      camera.updateProjectionMatrix();
      scopeOverlayEl.classList.toggle("visible", aiming && scopedWeapon);
      gun.visible = !(aiming && scopedWeapon);
    }

    function showCenterBanner(title, text) {
      centerBannerTitleEl.textContent = title;
      centerBannerTextEl.textContent = text || "";
      centerBannerEl.classList.add("visible");
      setTimeout(() => centerBannerEl.classList.remove("visible"), 2200);
    }

    function pushFeed(text) {
      feed.unshift(text);
      feed.splice(5);
      feedEl.innerHTML = "";
      feed.forEach((item) => {
        const div = document.createElement("div");
        div.textContent = item;
        feedEl.appendChild(div);
      });
    }

    function flashDamage(headshot = false) {
      damageVignetteEl.classList.add("hit");
      damageVignetteEl.style.opacity = headshot ? "1" : "";
      setTimeout(() => {
        damageVignetteEl.classList.remove("hit");
        damageVignetteEl.style.opacity = "";
      }, headshot ? 150 : 80);
    }

    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }

      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
    }

    function pew() {
      if (!audioCtx) return;

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.frequency.value = 130;
      gain.gain.value = 0.045;
      osc.connect(gain).connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.045);
    }

    function playHitSound(headshot) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.frequency.value = headshot ? 820 : 520;
      gain.gain.value = headshot ? 0.04 : 0.025;
      osc.connect(gain).connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + (headshot ? 0.09 : 0.045));
    }

    function playKillSound() {
      if (!audioCtx) return;
      [360, 540, 720].forEach((frequency, index) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.value = frequency;
        gain.gain.value = 0.035;
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(audioCtx.currentTime + index * 0.055);
        osc.stop(audioCtx.currentTime + index * 0.055 + 0.08);
      });
    }

    function send(payload) {
      if (!socket || socket.readyState !== WebSocket.OPEN) return;
      socket.send(JSON.stringify(payload));
    }

    function getRoomId() {
      const match = location.pathname.match(/^\/r\/([a-z0-9-]+)/i);
      if (match) return match[1].toLowerCase();

      const fromQuery = new URLSearchParams(location.search).get("room");
      const clean = String(fromQuery || "").toLowerCase().replace(/[^a-z0-9-]/g, "").slice(0, 32);
      const id = clean || Math.random().toString(36).slice(2, 8);
      history.replaceState(null, "", `/r/${id}`);
      return id;
    }

    function cleanName(value) {
      const name = String(value || "").replace(/[^\w -]/g, "").trim().slice(0, 18);
      return name || `Player ${Math.floor(100 + Math.random() * 900)}`;
    }

    function roundRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.arcTo(x + width, y, x + width, y + height, radius);
      ctx.arcTo(x + width, y + height, x, y + height, radius);
      ctx.arcTo(x, y + height, x, y, radius);
      ctx.arcTo(x, y, x + width, y, radius);
      ctx.closePath();
    }

    function hashString(value) {
      let hash = 2166136261;
      for (let i = 0; i < value.length; i += 1) {
        hash ^= value.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
      }
      return hash >>> 0;
    }

    function mulberry32(seed) {
      return function random() {
        let t = seed += 0x6D2B79F5;
        t = Math.imul(t ^ t >>> 15, t | 1);
        t ^= t + Math.imul(t ^ t >>> 7, t | 61);
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      })[char]);
    }
  </script>
