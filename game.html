<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multiplayer Shooter</title>
  <style>
    :root {
      color-scheme: dark;
      --panel: rgba(8, 12, 18, 0.78);
      --panel-strong: rgba(7, 10, 14, 0.92);
      --line: rgba(255, 255, 255, 0.16);
      --text: #f7fafc;
      --muted: #b8c3cf;
      --good: #58d68d;
      --warn: #ffcf5a;
      --bad: #ff6b6b;
      --accent: #4fb4ff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      overflow: hidden;
      background: #06080c;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    canvas {
      display: block;
    }

    button,
    input {
      font: inherit;
    }

    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      display: grid;
      gap: 8px;
      width: min(320px, calc(100vw - 24px));
      pointer-events: none;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .stat,
    #roomPanel,
    #feed,
    #playersPanel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(10px);
    }

    #matchPanel,
    #bossPanel,
    #minimapPanel,
    #boostPanel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(10px);
    }

    #matchPanel {
      position: fixed;
      top: 12px;
      left: 50%;
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 8px 14px;
      max-width: min(720px, 96vw);
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 800;
      transform: translateX(-50%);
      pointer-events: none;
    }

    #matchPanel.coop {
      font-size: 12px;
    }

    #chaosFill {
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff6b3d, #ffd93d);
      width: 0%;
      max-width: 100%;
    }

    #coopChaosBar {
      flex-basis: 100%;
      display: flex;
      justify-content: center;
      width: 100%;
    }

    #chaosTrack {
      width: min(200px, 42vw);
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      overflow: hidden;
    }

    #bossPanel {
      position: fixed;
      top: 58px;
      left: 50%;
      z-index: 10;
      display: none;
      width: min(520px, calc(100vw - 32px));
      padding: 8px;
      transform: translateX(-50%);
      pointer-events: none;
    }

    #bossPanel.visible {
      display: block;
    }

    #bossBar,
    #bossFill {
      height: 10px;
      border-radius: 999px;
    }

    #bossBar {
      margin-top: 5px;
      background: rgba(255, 255, 255, 0.14);
      overflow: hidden;
    }

    #bossFill {
      width: 100%;
      background: #ff6b3d;
    }

    #minimapPanel {
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 10;
      padding: 8px;
      pointer-events: none;
    }

    #minimap {
      display: block;
      width: 220px;
      height: 220px;
    }

    #scopeOverlay {
      position: fixed;
      inset: 0;
      z-index: 12;
      display: none;
      pointer-events: none;
      background:
        radial-gradient(circle at center, transparent 0 26%, rgba(0, 0, 0, 0.08) 27%, rgba(0, 0, 0, 0.95) 36%),
        linear-gradient(transparent calc(50% - 1px), rgba(255,255,255,0.7) calc(50% - 1px), rgba(255,255,255,0.7) calc(50% + 1px), transparent calc(50% + 1px)),
        linear-gradient(90deg, transparent calc(50% - 1px), rgba(255,255,255,0.7) calc(50% - 1px), rgba(255,255,255,0.7) calc(50% + 1px), transparent calc(50% + 1px));
    }

    #scopeOverlay.visible {
      display: block;
    }

    #boostPanel {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 10;
      display: none;
      max-width: 270px;
      padding: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      pointer-events: none;
    }

    #boostPanel.visible {
      display: block;
    }

    #hitMarker {
      position: fixed;
      top: 50%;
      left: 50%;
      z-index: 11;
      width: 34px;
      height: 34px;
      margin: -17px 0 0 -17px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 90ms ease;
    }

    #hitMarker.visible {
      opacity: 1;
    }

    #hitMarker::before,
    #hitMarker::after {
      content: "";
      position: absolute;
      top: 15px;
      left: 4px;
      width: 26px;
      height: 3px;
      border-radius: 999px;
      background: #ffffff;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
    }

    #hitMarker::before {
      transform: rotate(45deg);
    }

    #hitMarker::after {
      transform: rotate(-45deg);
    }

    #centerBanner {
      position: fixed;
      left: 50%;
      top: 30%;
      z-index: 21;
      display: none;
      min-width: min(460px, calc(100vw - 32px));
      padding: 14px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      background: var(--panel-strong);
      text-align: center;
      transform: translateX(-50%);
      pointer-events: none;
    }

    #centerBanner.visible {
      display: block;
    }

    #centerBannerTitle {
      font-size: 24px;
      font-weight: 900;
    }

    #centerBannerText {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .stat {
      padding: 8px;
      min-width: 0;
    }

    .label {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .value {
      margin-top: 3px;
      font-size: 20px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
    }

    #roomPanel {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 8px;
      pointer-events: auto;
    }

    #weaponPanel {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 8px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      pointer-events: none;
    }

    #weaponName {
      overflow: hidden;
      font-size: 15px;
      font-weight: 800;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #ammo {
      color: var(--warn);
      font-size: 15px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    #pickupHint {
      display: none;
      padding: 8px;
      background: rgba(8, 12, 18, 0.86);
      border: 1px solid rgba(79, 180, 255, 0.45);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      pointer-events: none;
    }

    #pickupHint.visible {
      display: block;
    }

    #nukeHud {
      padding: 8px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: #ff6b3d;
      font-size: 13px;
      font-weight: 800;
      pointer-events: none;
    }

    #roomLink {
      min-width: 0;
      overflow: hidden;
      color: var(--muted);
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #copyRoom,
    #playButton {
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 7px;
      background: #e8f3ff;
      color: #08111c;
      cursor: pointer;
      font-weight: 700;
      min-height: 34px;
      padding: 0 12px;
    }

    #feed {
      display: grid;
      gap: 4px;
      max-height: 120px;
      overflow: hidden;
      padding: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    #feed:empty {
      display: none;
    }

    #playersPanel {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 10;
      width: min(260px, calc(100vw - 24px));
      max-height: 42vh;
      overflow: hidden;
      padding: 10px;
    }

    #playersPanel h2 {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    #players {
      display: grid;
      gap: 6px;
      max-height: calc(42vh - 38px);
      overflow: auto;
    }

    .playerRow {
      display: grid;
      grid-template-columns: 10px minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      min-height: 24px;
      color: var(--muted);
      font-size: 13px;
    }

    .swatch {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: currentColor;
    }

    .playerName {
      overflow: hidden;
      color: var(--text);
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .playerScore {
      font-variant-numeric: tabular-nums;
    }

    #crosshair {
      position: fixed;
      top: 50%;
      left: 50%;
      z-index: 8;
      width: 18px;
      height: 18px;
      margin: -9px 0 0 -9px;
      pointer-events: none;
    }

    #crosshair::before,
    #crosshair::after {
      content: "";
      position: absolute;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.65);
    }

    #crosshair::before {
      left: 8px;
      top: 0;
      width: 2px;
      height: 18px;
    }

    #crosshair::after {
      left: 0;
      top: 8px;
      width: 18px;
      height: 2px;
    }

    #overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 20px;
      background: linear-gradient(180deg, rgba(3, 5, 9, 0.52), rgba(3, 5, 9, 0.14));
      pointer-events: auto;
    }

    #overlay.hidden {
      opacity: 0;
      pointer-events: none;
      transition: opacity 120ms ease;
    }

    #overlayPanel {
      display: grid;
      gap: 12px;
      width: min(420px, 100%);
      padding: 16px;
      background: var(--panel-strong);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.42);
    }

    #gameModeRow {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .modeButton {
      min-height: 44px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      font-weight: 800;
      padding: 0 10px;
    }

    .modeButton.selected {
      border-color: rgba(79, 180, 255, 0.75);
      background: rgba(79, 180, 255, 0.22);
    }

    #overlayTitle {
      margin: 0;
      font-size: 24px;
      line-height: 1.05;
    }

    #overlayStatus {
      min-height: 18px;
      color: var(--muted);
      font-size: 13px;
    }

    #powerups {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .powerupButton {
      min-height: 44px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
      padding: 0 8px;
    }

    .powerupButton.selected {
      border-color: rgba(79, 180, 255, 0.7);
      background: rgba(79, 180, 255, 0.22);
    }

    #nameInput {
      width: 100%;
      height: 38px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      outline: none;
      padding: 0 10px;
    }

    #nameInput:focus {
      border-color: rgba(79, 180, 255, 0.75);
    }

    #damageVignette {
      position: fixed;
      inset: 0;
      z-index: 7;
      background: radial-gradient(circle, rgba(255, 0, 0, 0) 52%, rgba(255, 0, 0, 0.36) 100%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease;
    }

    #damageVignette.hit {
      opacity: 1;
      transition: none;
    }

    #damagePopups {
      position: fixed;
      inset: 0;
      z-index: 9;
      display: grid;
      place-items: center;
      pointer-events: none;
    }

    .damagePopup {
      position: absolute;
      top: calc(50% + 54px);
      left: 50%;
      min-width: 76px;
      padding: 5px 10px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 7px;
      background: rgba(8, 12, 18, 0.74);
      color: #ffcf5a;
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
      text-align: center;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.55);
      transform: translate(-50%, 0);
      animation: damageFloat 720ms ease-out forwards;
    }

    .damagePopup.headshot {
      color: #ff6b6b;
      font-size: 30px;
      border-color: rgba(255, 107, 107, 0.5);
    }

    .damagePopup.dealt {
      top: calc(50% - 70px);
      min-width: 64px;
      background: rgba(8, 12, 18, 0.56);
      color: #f7fafc;
      font-size: 19px;
      border-color: rgba(79, 180, 255, 0.45);
    }

    .damagePopup.dealt.headshot {
      color: #ff6b6b;
      font-size: 24px;
    }

    @keyframes damageFloat {
      0% {
        opacity: 0;
        transform: translate(-50%, 14px) scale(0.86);
      }

      16% {
        opacity: 1;
        transform: translate(-50%, -2px) scale(1.08);
      }

      100% {
        opacity: 0;
        transform: translate(-50%, -54px) scale(0.96);
      }
    }

    #goatHud {
      display: none;
      padding: 8px;
      background: var(--panel);
      border: 1px solid rgba(210, 175, 95, 0.45);
      border-radius: 8px;
      color: #f5e6c8;
      font-size: 11px;
      font-weight: 800;
      pointer-events: none;
      max-width: 280px;
    }

    #goatHud.visible {
      display: grid;
      gap: 4px;
    }

    #goatHud .abil {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      opacity: 0.92;
    }

    #memeBlindOverlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.82);
      pointer-events: none;
    }

    #memeBlindOverlay.visible {
      display: grid;
    }

    #memeBlindCard {
      max-width: min(520px, 94vw);
      padding: 18px;
      border-radius: 12px;
      border: 3px solid #ffd93d;
      background: #1a1224;
      color: #fff;
      font-size: clamp(18px, 3.5vw, 26px);
      font-weight: 900;
      text-align: center;
      line-height: 1.35;
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.55);
    }

    #memeBlindBy {
      margin-top: 10px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
    }

    @media (max-width: 720px) {
      #playersPanel {
        top: auto;
        right: 12px;
        bottom: 12px;
        max-height: 28vh;
      }

      .value {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div id="hud">
    <div class="stats">
      <div class="stat">
        <div class="label">HP</div>
        <div class="value" id="hp">100</div>
      </div>
      <div class="stat">
        <div class="label">Kills</div>
        <div class="value" id="kills">0</div>
      </div>
      <div class="stat">
        <div class="label">Deaths</div>
        <div class="value" id="deaths">0</div>
      </div>
    </div>
    <div id="roomPanel">
      <div id="roomLink"></div>
      <button id="copyRoom" type="button">Copy</button>
    </div>
    <div id="weaponPanel">
      <div id="weaponName">Pistol</div>
      <div id="ammo">∞</div>
    </div>
    <div id="nukeHud">Nukes: <span id="nukes">0</span></div>
    <div id="goatHud">
      <div style="color:#ffd93d;font-size:13px">GOAT MODE — guns disabled</div>
      <div class="abil"><span>1 Ram</span><span id="cdRam">ready</span></div>
      <div class="abil"><span>2 Kid swarm</span><span id="cdSwarm">ready</span></div>
      <div class="abil"><span>3 Freeze</span><span id="cdFreeze">ready</span></div>
      <div class="abil"><span>4 Meme blind</span><span id="cdBlind">ready</span></div>
    </div>
    <div id="pickupHint"></div>
    <div id="feed"></div>
  </div>

  <div id="playersPanel">
    <h2 id="playersPanelTitle">Players</h2>
    <div id="players"></div>
  </div>

  <div id="matchPanel">
    <span id="roundInfo">Round 1</span>
    <span id="matchTimer">5:00</span>
    <span id="killLimit">25 kills</span>
    <span id="coopWaveRow" style="display:none">Wave <span id="coopWave">1</span></span>
    <span id="coopLifeRow" style="display:none">Lives <span id="coopLives">—</span></span>
    <span id="coopCreditRow" style="display:none">Credits <span id="coopCredits">0</span></span>
    <span id="coopChaosRow" style="display:none" title="Team chaos meter — fill it for a Golden Piñata">Chaos</span>
    <div id="coopChaosBar" style="display:none" title="Fill the bar — spawn a Golden Piñata of loot">
      <div id="chaosTrack"><div id="chaosFill"></div></div>
    </div>
    <span id="coopComboRow" style="display:none">Combo <span id="coopCombo">0</span>x</span>
  </div>

  <div id="bossPanel">
    <div id="bossName">Boss</div>
    <div id="bossBar"><div id="bossFill"></div></div>
  </div>

  <div id="minimapPanel">
    <canvas id="minimap" width="220" height="220"></canvas>
  </div>

  <div id="boostPanel"></div>

  <div id="crosshair"></div>
  <div id="scopeOverlay"></div>
  <div id="hitMarker"></div>
  <div id="damageVignette"></div>
  <div id="damagePopups"></div>

  <div id="memeBlindOverlay">
    <div id="memeBlindCard">
      <div id="memeBlindText"></div>
      <div id="memeBlindBy"></div>
    </div>
  </div>

  <div id="centerBanner">
    <div id="centerBannerTitle"></div>
    <div id="centerBannerText"></div>
  </div>

  <div id="overlay">
    <div id="overlayPanel">
      <h1 id="overlayTitle">Arena</h1>
      <div id="gameModeRow">
        <button class="modeButton selected" type="button" data-mode="pvp">PvP — last squad standing energy</button>
        <button class="modeButton" type="button" data-mode="coop">Co-op — chaos meter & piñatas</button>
      </div>
      <input id="nameInput" maxlength="18" autocomplete="off" spellcheck="false" aria-label="Player name">
      <div id="powerups">
        <button class="powerupButton selected" type="button" data-powerup="speed">Double Speed</button>
        <button class="powerupButton" type="button" data-powerup="damage">+0.5 Damage</button>
        <button class="powerupButton" type="button" data-powerup="health">+0.5 Health</button>
      </div>
      <button id="playButton" type="button">Play</button>
      <div id="overlayStatus">Connecting...</div>
    </div>
  </div>

  <script src="/vendor/three.min.js"></script>
  <script>
    const roomId = getRoomId();
    const roomUrl = `${location.origin}/r/${roomId}`;
    const savedName = localStorage.getItem("arenaName") || `Player ${Math.floor(100 + Math.random() * 900)}`;

    const hpEl = document.getElementById("hp");
    const killsEl = document.getElementById("kills");
    const deathsEl = document.getElementById("deaths");
    const roomLinkEl = document.getElementById("roomLink");
    const copyRoomEl = document.getElementById("copyRoom");
    const weaponNameEl = document.getElementById("weaponName");
    const ammoEl = document.getElementById("ammo");
    const nukesEl = document.getElementById("nukes");
    const pickupHintEl = document.getElementById("pickupHint");
    const playersEl = document.getElementById("players");
    const roundInfoEl = document.getElementById("roundInfo");
    const matchTimerEl = document.getElementById("matchTimer");
    const killLimitEl = document.getElementById("killLimit");
    const coopWaveRowEl = document.getElementById("coopWaveRow");
    const coopWaveEl = document.getElementById("coopWave");
    const coopLifeRowEl = document.getElementById("coopLifeRow");
    const coopLivesEl = document.getElementById("coopLives");
    const coopCreditRowEl = document.getElementById("coopCreditRow");
    const coopCreditsEl = document.getElementById("coopCredits");
    const coopChaosRowEl = document.getElementById("coopChaosRow");
    const coopChaosBarEl = document.getElementById("coopChaosBar");
    const chaosFillEl = document.getElementById("chaosFill");
    const coopComboRowEl = document.getElementById("coopComboRow");
    const coopComboEl = document.getElementById("coopCombo");
    const playersPanelTitleEl = document.getElementById("playersPanelTitle");
    const matchPanelEl = document.getElementById("matchPanel");
    const bossPanelEl = document.getElementById("bossPanel");
    const bossNameEl = document.getElementById("bossName");
    const bossFillEl = document.getElementById("bossFill");
    const minimapEl = document.getElementById("minimap");
    const minimapCtx = minimapEl.getContext("2d");
    const boostPanelEl = document.getElementById("boostPanel");
    const hitMarkerEl = document.getElementById("hitMarker");
    const scopeOverlayEl = document.getElementById("scopeOverlay");
    const centerBannerEl = document.getElementById("centerBanner");
    const centerBannerTitleEl = document.getElementById("centerBannerTitle");

    let gameMode = "pvp";

    const WEAPON_META = {

      sniper: { name: "Sniper", ammo: 6, reloadMs: 1450, color: "#9fe8ff" },
      shotgun: { name: "Shotgun", ammo: 18, reloadMs: 950, color: "#ffb15f" },
      machinegun: { name: "Machine Gun", ammo: 70, reloadMs: 95, color: "#a9ff8f" },
      bazooka: { name: "Bazooka", ammo: 3, reloadMs: 2300, color: "#ff6b3d" },

    };

    roomLinkEl.textContent = roomUrl;
    nameInputEl.value = savedName;
    gameModeButtons.forEach((btn) => {
      btn.classList.toggle("selected", btn.dataset.mode === pendingGameMode);
    });

    let socket;
    let myId = null;
    let connected = false;
    let dead = false;
    let lastHp = 100;
    let maxHp = 100;
    let pendingRespawnAt = 0;
    let lastStateSentAt = 0;
    let lastShotAt = 0;
    let selectedPowerup = "speed";
    let currentWeapon = "pistol";
    let currentAmmo = 0;
    let nukes = 0;
    let speedMultiplier = 1;
    let verticalVelocity = 0;
    let grounded = true;
    let nearestPickup = null;
    let latestPickups = [];
    let latestBots = [];
    let latestBoss = null;
    let latestPlayers = [];
    let matchState = null;
    let hitMarkerTimer = 0;
    let aiming = false;
    let aimingByMouse = false;
    let aimingByKey = false;
    let targetFov = 75;
    let audioCtx = null;
    let isGoat = false;
    let goatTier = 0;
    let myFrozenUntil = 0;
    const goatKids = [];

    const GOAT_MEMES = [
      "Skill issue (certified)",
      "You’ve been GOAT’d — cope visually",
      "This is fine 🔥 (it’s not)",
      "Main character moment (you’re the NPC)",
      "Touch grass (touch pad instead)",
      "Reported for: extreme bleating",
      "Your aim is a mythological creature",
      "Press F to pay respects (you can’t)",
      "POV: you looked at the wrong goat",
      "Achievement unlocked: Bean brain"
    ];

    const remotePlayers = new Map();
    const aiEntities = new Map();
    const playerStates = new Map();
    const pickups = new Map();
    const tracers = [];
    const damageNumbers = [];
    const explosions = [];
    const feed = [];
    const obstacleLayout = buildObstacleLayout(roomId);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x85c5df);
    scene.fog = new THREE.Fog(0x85c5df, 65, 245);

    const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 1000);
    const pitch = new THREE.Object3D();
    pitch.add(camera);

    const yaw = new THREE.Object3D();
    yaw.position.set(0, 2, 0);
    yaw.add(pitch);
    scene.add(yaw);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const sun = new THREE.DirectionalLight(0xffffff, 1.35);
    sun.position.set(80, 160, 40);
    sun.castShadow = true;
    scene.add(sun);
    scene.add(new THREE.AmbientLight(0xffffff, 0.48));

    buildArena();

    const gun = new THREE.Group();
    camera.add(gun);

    let heldWeaponModel = createWeaponModel("pistol", 1, true);
    heldWeaponModel.position.set(0.28, -0.24, -0.72);
    gun.add(heldWeaponModel);

    const muzzle = new THREE.PointLight(0xffb347, 0, 12);
    muzzle.position.set(0.3, -0.23, -1.2);
    gun.add(muzzle);

    let recoil = 0;
    const move = { f: 0, b: 0, l: 0, r: 0, sprint: 0 };
    const clock = new THREE.Clock();

    connect();
    animate();

    playButtonEl.addEventListener("click", startPlaying);
    renderer.domElement.addEventListener("click", () => {
      if (!document.pointerLockElement && overlayEl.classList.contains("hidden")) {
        renderer.domElement.requestPointerLock();
      }
    });

    copyRoomEl.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(roomUrl);
        copyRoomEl.textContent = "Copied";
        setTimeout(() => copyRoomEl.textContent = "Copy", 900);
      } catch {
        copyRoomEl.textContent = "Select URL";
        setTimeout(() => copyRoomEl.textContent = "Copy", 1200);
      }
    });

    nameInputEl.addEventListener("change", () => {
      const name = cleanName(nameInputEl.value);
      nameInputEl.value = name;
      localStorage.setItem("arenaName", name);
      send({ type: "rename", name });
    });

    powerupButtons.forEach((button) => {
      button.addEventListener("click", () => {
        selectedPowerup = button.dataset.powerup;
        powerupButtons.forEach((item) => item.classList.toggle("selected", item === button));
        send({ type: "powerup", powerup: selectedPowerup });
      });
    });

    gameModeButtons.forEach((button) => {
      button.addEventListener("click", () => {
        pendingGameMode = button.dataset.mode || "pvp";
        localStorage.setItem("arenaGameMode", pendingGameMode);
        gameModeButtons.forEach((item) => item.classList.toggle("selected", item === button));
        reconnectForMode();
      });
    });

    function reconnectForMode() {
      if (!socket || socket.readyState !== WebSocket.OPEN) {
        connect();
        return;
      }
      skipAutoReconnect = true;
      socket.close();
      setTimeout(connect, 140);
    }

    document.addEventListener("mousemove", (event) => {
      if (!document.pointerLockElement || dead) return;

      yaw.rotation.y -= event.movementX * 0.002;
      pitch.rotation.x -= event.movementY * 0.002;
      pitch.rotation.x = Math.max(-1.2, Math.min(1.2, pitch.rotation.x));
    });

    document.addEventListener("keydown", (event) => {
      if (event.code === "KeyW") move.f = 1;
      if (event.code === "KeyS") move.b = 1;
      if (event.code === "KeyA") move.l = 1;
      if (event.code === "KeyD") move.r = 1;
      if (event.code === "ShiftLeft") move.sprint = 1;
      if (event.code === "Space") jump();
      if (event.code === "KeyE") pickupNearest();
      if (event.code === "KeyF") useNuke();
      if (event.code === "Digit1") useGoatAbility("ram");
      if (event.code === "Digit2") useGoatAbility("swarm");
      if (event.code === "Digit3") useGoatAbility("freeze");
      if (event.code === "Digit4") useGoatAbility("blind");
      if (event.code === "KeyQ" || event.code === "MetaLeft" || event.code === "MetaRight") {
        aimingByKey = true;
        updateAimingState();
      }
      if (event.code === "Escape") showOverlay();
    });

    document.addEventListener("keyup", (event) => {
      if (event.code === "KeyW") move.f = 0;
      if (event.code === "KeyS") move.b = 0;
      if (event.code === "KeyA") move.l = 0;
      if (event.code === "KeyD") move.r = 0;
      if (event.code === "ShiftLeft") move.sprint = 0;
      if (event.code === "KeyQ" || event.code === "MetaLeft" || event.code === "MetaRight") {
        aimingByKey = false;
        updateAimingState();
      }
    });

    window.addEventListener("mousedown", (event) => {
      if (event.button !== 0) return;
      if (!document.pointerLockElement || dead || !connected || isGoat) return;
      fire();
    });

    window.addEventListener("contextmenu", (event) => event.preventDefault());

    window.addEventListener("mousedown", (event) => {
      if (event.button !== 2 || !document.pointerLockElement || dead) return;
      aimingByMouse = true;
      updateAimingState();
    });

    window.addEventListener("mouseup", (event) => {
      if (event.button !== 2) return;
      aimingByMouse = false;
      updateAimingState();
    });

    function updateAimingState() {
      aiming = aimingByMouse || aimingByKey;
    }

    document.addEventListener("pointerlockchange", () => {
      if (!document.pointerLockElement) showOverlay();
    });

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    function connect() {
      const protocol = location.protocol === "https:" ? "wss" : "ws";
      const name = cleanName(nameInputEl.value);
      const modeQs = pendingGameMode === "coop" ? "&mode=coop" : "";
      const url = `${protocol}://${location.host}/ws?room=${encodeURIComponent(roomId)}&name=${encodeURIComponent(name)}${modeQs}`;

      socket = new WebSocket(url);

      socket.addEventListener("open", () => {
        connected = true;
        overlayStatusEl.textContent = "Ready";
      });

      socket.addEventListener("close", () => {
        connected = false;
        if (skipAutoReconnect) {
          skipAutoReconnect = false;
          return;
        }
        overlayStatusEl.textContent = "Disconnected. Reconnecting...";
        showOverlay();
        setTimeout(connect, 900);
      });

      socket.addEventListener("message", (event) => {
        const msg = JSON.parse(event.data);

        if (msg.type === "welcome") {
          myId = msg.id;
          gameMode = msg.gameMode || "pvp";
          Object.assign(WEAPON_META, msg.weapons || {});
          yaw.position.set(msg.player.position.x, msg.player.position.y, msg.player.position.z);
          overlayStatusEl.textContent = "Ready";
          send({ type: "powerup", powerup: selectedPowerup });
          return;
        }

        if (msg.type === "snapshot") {
          if (msg.gameMode) {
            gameMode = msg.gameMode;
          }
          applySnapshot(msg.players, msg.pickups || [], msg.bots || [], msg.boss, msg.match);
          return;
        }

        if (msg.type === "event") {
          applyEvent(msg);
        }
      });
    }

    function applySnapshot(players, pickupSnapshot, botSnapshot, bossSnapshot, matchSnapshot) {
      const seen = new Set();
      latestPlayers = players;
      latestPickups = pickupSnapshot;
      latestBots = botSnapshot;
      latestBoss = bossSnapshot;
      matchState = matchSnapshot;

      players.forEach((player) => {
        playerStates.set(player.id, player);
        seen.add(player.id);

        if (player.id === myId) {
          updateSelf(player);
          return;
        }

        updateRemotePlayer(player);
      });

      for (const [id, remote] of remotePlayers) {
        if (!seen.has(id)) {
          scene.remove(remote.group);
          remotePlayers.delete(id);
          playerStates.delete(id);
        }
      }

      renderPlayers(players);
      renderPickups(pickupSnapshot);
      renderAi([...botSnapshot, ...(bossSnapshot ? [bossSnapshot] : [])]);
      renderMatch(matchSnapshot);
      renderBossHud(bossSnapshot);
    }

    function updateSelf(player) {
      maxHp = player.maxHp || 100;
      currentWeapon = player.currentWeapon || "pistol";
      currentAmmo = player.ammo || 0;
      nukes = player.nukes || 0;
      speedMultiplier = player.speedMultiplier || 1;
      hpEl.textContent = `${player.hp}/${maxHp}`;
      killsEl.textContent = player.kills;
      deathsEl.textContent = player.deaths;
      nukesEl.textContent = nukes;

      if (!player.spawned) {
        dead = false;
        lastHp = player.hp;
        isGoat = false;
        goatTier = 0;
        myFrozenUntil = 0;
        goatHudEl.classList.remove("visible");
        gun.visible = true;
        updateWeaponHud();
        return;
      }

      isGoat = !!player.isGoat;
      goatTier = player.goatTier || 0;
      myFrozenUntil = player.frozenUntil || 0;
      updateWeaponHud();
      updateGoatHud(player);

      if (player.hp < lastHp) flashDamage();
      lastHp = player.hp;

      if (!player.alive) {
        dead = true;
        pendingRespawnAt = player.respawnAt;
        showOverlay();
        return;
      }

      if (dead) {
        yaw.position.set(player.position.x, player.position.y, player.position.z);
        verticalVelocity = 0;
        grounded = true;
        pitch.rotation.x = 0;
        dead = false;
        lastHp = player.hp;
        showOverlay();
      }
    }

    function updateRemotePlayer(player) {
      let remote = remotePlayers.get(player.id);
      if (!remote) {
        remote = createRemotePlayer(player);
        remotePlayers.set(player.id, remote);
        scene.add(remote.group);
      }

      remote.group.visible = player.alive;
      remote.target.set(player.position.x, player.position.y, player.position.z);
      remote.group.rotation.y = player.yaw || 0;

      const wasGoat = !!remote.isGoat;
      remote.isGoat = !!player.isGoat;
      if (wasGoat !== remote.isGoat) {
        remote.body.material.color.setHex(remote.isGoat ? 0x9a6b3d : new THREE.Color(player.color).getHex());
        remote.head.material.color.setHex(remote.isGoat ? 0xd6bc9c : 0xffdfc7);
      }
      remote.gun.visible = !remote.isGoat;

      if (!remote.isGoat && remote.weaponName !== player.currentWeapon) {
        remote.group.remove(remote.gun);
        remote.gun.traverse((node) => {
          if (node.geometry) node.geometry.dispose();
          if (node.material) node.material.dispose();
        });
        remote.gun = createWeaponModel(player.currentWeapon || "pistol", 0.55, false);
        remote.gun.position.set(0.34, -0.2, -0.55);
        remote.weaponName = player.currentWeapon || "pistol";
        remote.group.add(remote.gun);
      }
      updateRemoteHealth(remote, player.hp);
      remote.nameSprite.material.map.dispose();
      remote.nameSprite.material.map = makeNameTexture(player.name, player.color);
      remote.nameSprite.material.needsUpdate = true;
    }

    function applyEvent(msg) {
      if (msg.event === "shot") {
        const projectiles = msg.projectiles && msg.projectiles.length
          ? msg.projectiles
          : [{ direction: msg.direction, length: msg.hitId ? 45 : 80 }];
        projectiles.forEach((projectile) => {
          drawTracer(msg.origin, projectile.direction, projectile.length, msg.shooterId === myId, msg.weapon);
          if (projectile.explosion) {
            spawnExplosion(projectile.explosion, msg.weapon);
          }
        });

        const hits = msg.hits && msg.hits.length
          ? msg.hits
          : (msg.hitId ? [{ id: msg.hitId, damage: msg.damage, part: msg.hitPart }] : []);

        hits.forEach((hit) => {
          applyHitAnimation(hit.id, hit.part === "head");
          if (msg.shooterId === myId) {
            showScreenDamage(hit.damage, hit.part === "head", "dealt");
            showHitMarker(hit.part === "head");
            playHitSound(hit.part === "head");
          }

          if (hit.id === myId) {
            flashDamage(hit.part === "head");
            showScreenDamage(hit.damage, hit.part === "head", "taken");
          } else {
            showFloatingDamage(hit.id, hit.damage, hit.part === "head");
          }
        });

        if (msg.killed) {
          const shooter = playerStates.get(msg.shooterId);
          const target = playerStates.get(msg.hitId);
          if (shooter && target) {
            const hitText = msg.hitPart === "head" ? " with a headshot" : "";
            pushFeed(`${shooter.name} eliminated ${target.name}${hitText}`);
            if (msg.shooterId === myId) {
              showCenterBanner("Eliminated", `${target.name}${hitText}`);
              playKillSound();
            }
          }
        }
        return;
      }

      if (msg.event === "goat-blind-you") {
        showGoatMemeBlind(msg.memeIndex, msg.by);
        return;
      }

      if (msg.event === "goat-mode") {
        pushFeed(`${msg.player.name} ascended — GOAT MODE tier ${msg.tier}`);
        if (msg.player.id === myId) {
          showCenterBanner("GOAT MODE", `Tier ${msg.tier} — 400 HP, no heals. Keys 1–4`);
          playKillSound();
        }
        return;
      }

      if (msg.event === "goat-swarm") {
        spawnGoatKids(msg);
        return;
      }

      if (msg.event === "goat-freeze") {
        pushFeed("GOAT FREEZE!");
        return;
      }

      if (msg.event === "goat-ram") {
        if (msg.hits && msg.hits.length) {
          msg.hits.forEach((h) => showFloatingDamage(h.id, h.damage, false));
        }
        return;
      }

      if (msg.event === "pickup") {
        if (msg.player.id === myId) {
          currentWeapon = msg.player.currentWeapon || "pistol";
          currentAmmo = msg.player.ammo || 0;
          nukes = msg.player.nukes || 0;
          updateWeaponHud();
          nukesEl.textContent = nukes;
        }
        pushFeed(`${msg.player.name} picked up ${weaponLabel(msg.pickup.weapon)}`);
        return;
      }

      if (msg.event === "ai-hit" && msg.target.id === myId) {
        flashDamage(false);
        showScreenDamage(msg.damage, false, "taken");
        pushFeed(`${msg.attacker.name} hit you`);
        return;
      }

      if (msg.event === "bot-spawn") {
        pushFeed("Bot entered the arena");
        return;
      }

      if (msg.event === "boss-spawn") {
        showCenterBanner("Boss inbound", "Defeat it to drop a nuke");
        pushFeed("Boss spawned");
        return;
      }

      if (msg.event === "boss-dead") {
        showCenterBanner("Boss down", "A nuke dropped");
        pushFeed("Boss dropped a nuke");
        return;
      }

      if (msg.event === "nuke") {
        spawnExplosion({ ...msg.origin, radius: 42 });
        if (msg.player.id === myId) {
          nukes = msg.player.nukes || 0;
          nukesEl.textContent = nukes;
        }
        (msg.hits || []).forEach((hit) => {
          showFloatingDamage(hit.id, hit.damage, false);
          applyHitAnimation(hit.id, false);
        });
        pushFeed(`${msg.player.name} launched a nuke`);
        return;
      }

      if (msg.event === "weapon-empty" && msg.player.id === myId) {
        currentWeapon = "pistol";
        currentAmmo = 0;
        updateWeaponHud();
        pushFeed("Weapon empty. Switched to pistol.");
        return;
      }

      if (msg.event === "powerup" && msg.player.id === myId) {
        speedMultiplier = msg.player.speedMultiplier || 1;
        maxHp = msg.player.maxHp || maxHp;
        hpEl.textContent = `${msg.player.hp}/${maxHp}`;
        return;
      }

      if (msg.event === "match-ended") {
        const winner = msg.match && msg.match.winner;
        showCenterBanner(winner ? `${winner.name} wins` : "Round ended", "Next round starting soon");
        return;
      }

      if (msg.event === "coop-wave-start") {
        showCenterBanner(`Wave ${msg.wave}`, msg.mutatorLabel || "Hold the line together");
        pushFeed(`Wave ${msg.wave} — ${msg.mutatorLabel || "standard chaos"}`);
        return;
      }

      if (msg.event === "coop-wave-clear") {
        showCenterBanner(`Wave ${msg.completedWave} cleared`, "Loot break — heal up and grab drops");
        pushFeed(`Wave ${msg.completedWave} cleared → wave ${msg.nextWave}`);
        return;
      }

      if (msg.event === "coop-game-over") {
        showCenterBanner("Squad wiped", `${msg.credits} chaos credits banked`);
        pushFeed(`Game over at wave ${msg.wave}`);
        return;
      }

      if (msg.event === "coop-chaos-full") {
        showCenterBanner("CHAOS OVERFLOW", "Golden Piñata materializing!");
        playKillSound();
        return;
      }

      if (msg.event === "coop-life-lost") {
        pushFeed(`Shared lives left: ${msg.lives}`);
        return;
      }

      if (msg.event === "round-start") {
        showCenterBanner("New round", "First to the kill limit wins");
        return;
      }

      if (msg.event === "joined" && msg.player.id !== myId) {
        pushFeed(`${msg.player.name} joined`);
        return;
      }

      if (msg.event === "left") {
        const player = playerStates.get(msg.id);
        if (player) pushFeed(`${player.name} left`);
        return;
      }

      if (msg.event === "respawn" && msg.player.id !== myId) {
        pushFeed(`${msg.player.name} respawned`);
      }
    }

    function startPlaying() {
      const name = cleanName(nameInputEl.value);
      nameInputEl.value = name;
      localStorage.setItem("arenaName", name);
      send({ type: "rename", name });
      send({ type: "powerup", powerup: selectedPowerup });
      send({ type: "play" });

      if (!connected) return;

      overlayEl.classList.add("hidden");
      renderer.domElement.requestPointerLock();
      ensureAudio();
    }

    function showOverlay() {
      overlayEl.classList.remove("hidden");

      if (dead) {
        const seconds = Math.max(0, Math.ceil((pendingRespawnAt - Date.now()) / 1000));
        overlayTitleEl.textContent = seconds > 0 ? `Respawn in ${seconds}` : "Respawning";
        playButtonEl.disabled = true;
        requestAnimationFrame(showOverlay);
        return;
      }

      overlayTitleEl.textContent = "Arena";
      playButtonEl.disabled = !connected;
    }

    function fire() {
      if (isGoat) return;
      const now = performance.now();
      const weapon = WEAPON_META[currentWeapon] || WEAPON_META.pistol;
      if (now - lastShotAt < weapon.reloadMs) return;
      if (currentWeapon !== "pistol" && currentAmmo <= 0) return;
      lastShotAt = now;

      ensureAudio();
      pew();
      recoil = currentWeapon === "bazooka" ? 0.55 : currentWeapon === "sniper" ? 0.42 : currentWeapon === "shotgun" ? 0.36 : 0.18;
      muzzle.intensity = 2.2;
      setTimeout(() => muzzle.intensity = 0, 45);

      const direction = new THREE.Vector3();
      camera.getWorldDirection(direction);

      sendState();
      send({
        type: "fire",
        direction: { x: direction.x, y: direction.y, z: direction.z }
      });
    }

    function useNuke() {
      if (dead || !connected || nukes <= 0 || isGoat) return;
      send({ type: "nuke" });
    }

    function useGoatAbility(ability) {
      if (!connected || dead || !isGoat || gameMode !== "pvp") return;
      const payload = { type: "goatAbility", ability };
      if (ability === "ram") {
        const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(yaw.quaternion);
        forward.y = 0;
        if (forward.lengthSq() < 0.001) return;
        forward.normalize();
        payload.direction = { x: forward.x, z: forward.z };
      }
      send(payload);
    }

    function showGoatMemeBlind(memeIndex, byName) {
      const text = GOAT_MEMES[Math.max(0, Math.min(GOAT_MEMES.length - 1, memeIndex))] || GOAT_MEMES[0];
      memeBlindTextEl.textContent = text;
      memeBlindByEl.textContent = byName ? `Courtesy of ${byName}` : "";
      memeBlindOverlayEl.classList.add("visible");
      setTimeout(() => memeBlindOverlayEl.classList.remove("visible"), 2400);
    }

    function updateGoatHud(player) {
      const g = player && player.isGoat;
      goatHudEl.classList.toggle("visible", !!g);
      gun.visible = !g;
      if (!g || !player) return;
      const fmt = (ms) => (ms <= 0 ? "ready" : `${(ms / 1000).toFixed(1)}s`);
      cdRamEl.textContent = fmt(player.goatCdRam || 0);
      cdSwarmEl.textContent = fmt(player.goatCdSwarm || 0);
      cdFreezeEl.textContent = fmt(player.goatCdFreeze || 0);
      cdBlindEl.textContent = fmt(player.goatCdBlind || 0);
    }

    function spawnGoatKids(msg) {
      (msg.seeds || []).forEach((seed) => {
        const group = new THREE.Group();
        const mat = new THREE.MeshStandardMaterial({ color: 0xc4a574, roughness: 0.78 });
        const body = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.2, 0.36, 8), mat);
        body.position.y = 0.18;
        body.castShadow = true;
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.16, 8, 8), mat);
        head.position.set(0, 0.34, 0.1);
        const horn = new THREE.Mesh(
          new THREE.ConeGeometry(0.04, 0.16, 6),
          new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.5 })
        );
        horn.position.set(0.1, 0.4, 0.08);
        horn.rotation.z = -0.6;
        group.add(body, head, horn);
        const y = walkableHeightAt(seed.x, seed.z) + 0.1;
        group.position.set(seed.x, y, seed.z);
        scene.add(group);
        goatKids.push({
          group,
          born: performance.now(),
          ttl: msg.ttl || 5200,
          phase: seed.phase || 0
        });
      });
    }

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.05);
      moveLocalPlayer(dt);
      updateNetwork(dt);
      animateRemotePlayers(dt);
      animateTracers(dt);
      animateDamageNumbers(dt);
      animateExplosions(dt);
      updatePickupHint();
      updateBoostHud();
      renderMinimap();
      updateMatchClock();
      updateHitMarker(dt);
      updateScope(dt);
      for (let i = goatKids.length - 1; i >= 0; i -= 1) {
        const k = goatKids[i];
        k.phase += dt * 2.6;
        const baseY = walkableHeightAt(k.group.position.x, k.group.position.z) + 0.1;
        k.group.position.y = baseY + Math.sin(k.phase) * 0.1;
        k.group.rotation.y += dt * 1.8;
        if (performance.now() - k.born > k.ttl) {
          scene.remove(k.group);
          k.group.traverse((node) => {
            if (node.geometry) node.geometry.dispose();
            if (node.material) node.material.dispose();
          });
          goatKids.splice(i, 1);
        }
      }

      gun.position.z = -recoil;
      recoil *= 0.84;

      renderer.render(scene, camera);
    }

    function moveLocalPlayer(dt) {
      if (dead) return;

      if (Date.now() < myFrozenUntil) {
        const gy = walkableHeightAt(yaw.position.x, yaw.position.z, obstacleLayout, yaw.position.y) + 2;
        yaw.position.y = Math.max(gy, yaw.position.y);
        verticalVelocity = 0;
        return;
      }

      const groundY = walkableHeightAt(yaw.position.x, yaw.position.z, obstacleLayout, yaw.position.y) + 2;
      if (!document.pointerLockElement) {
        yaw.position.y = Math.max(groundY, yaw.position.y);
        return;
      }

      const speed = (move.sprint ? 23 : 14.5) * speedMultiplier * (aiming ? 0.58 : 1) * dt;
      const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(yaw.quaternion);
      const right = new THREE.Vector3(1, 0, 0).applyQuaternion(yaw.quaternion);
      forward.y = 0;
      right.y = 0;
      forward.normalize();
      right.normalize();

      if (move.f) moveWithCollision(forward.clone().multiplyScalar(speed));
      if (move.b) moveWithCollision(forward.clone().multiplyScalar(-speed));
      if (move.l) moveWithCollision(right.clone().multiplyScalar(-speed));
      if (move.r) moveWithCollision(right.clone().multiplyScalar(speed));

      yaw.position.x = clamp(yaw.position.x, -280, 280);
      yaw.position.z = clamp(yaw.position.z, -280, 280);

      const pad = activeJumpPad();
      if (pad) {
        verticalVelocity = Math.max(verticalVelocity, pad.boost);
      }
      verticalVelocity -= 25 * dt;
      yaw.position.y += verticalVelocity * dt;

      const nextGroundY = walkableHeightAt(yaw.position.x, yaw.position.z, obstacleLayout, yaw.position.y) + 2;
      if (yaw.position.y <= nextGroundY) {
        yaw.position.y = nextGroundY;
        verticalVelocity = 0;
        grounded = true;
      } else {
        grounded = false;
      }
    }

    function jump() {
      if (dead || !document.pointerLockElement || !grounded) return;
      const me = playerStates.get(myId);
      const jumpBoost = me && me.jumpBoostUntil > Date.now() ? 1.45 : 1;
      verticalVelocity = 13.2 * jumpBoost;
      grounded = false;
    }

    function moveWithCollision(delta) {
      yaw.position.add(delta);
      resolveLocalObjectCollision();
    }

    function resolveLocalObjectCollision() {
      const radius = 0.62;
      obstacleLayout.forEach((obstacle) => {
        if (obstacle.type === "jumpPad" || obstacle.type === "platform") return;
        if (yaw.position.y - 2 > obstacle.y + obstacle.height - 0.25) return;
        const dx = yaw.position.x - obstacle.x;
        const dz = yaw.position.z - obstacle.z;
        const distance = Math.hypot(dx, dz);
        const minDistance = radius + obstacle.radius;
        if (distance > 0.0001 && distance < minDistance) {
          const push = minDistance - distance;
          yaw.position.x += (dx / distance) * push;
          yaw.position.z += (dz / distance) * push;
        } else if (distance <= 0.0001) {
          yaw.position.x += minDistance;
        }
      });
    }

    function updateNetwork() {
      if (!connected || !myId || dead) return;

      const now = performance.now();
      if (now - lastStateSentAt < 50) return;

      lastStateSentAt = now;
      sendState();
    }

    function sendState() {
      send({
        type: "state",
        position: {
          x: yaw.position.x,
          y: yaw.position.y,
          z: yaw.position.z
        },
        yaw: yaw.rotation.y,
        pitch: pitch.rotation.x
      });
    }

    function animateRemotePlayers(dt) {
      for (const remote of [...remotePlayers.values(), ...aiEntities.values()]) {
        remote.group.position.lerp(remote.target, Math.min(1, dt * 12));
        remote.bob += dt * 8;
        remote.hitTimer = Math.max(0, remote.hitTimer - dt);
        remote.hitKick.lerp(new THREE.Vector3(0, 0, 0), Math.min(1, dt * 10));
        const hitPulse = remote.hitTimer > 0 ? remote.hitTimer / remote.hitDuration : 0;
        const scale = 1 + hitPulse * remote.hitScale;
        remote.body.scale.set(1 + hitPulse * remote.hitScale * 0.45, scale, 1 + hitPulse * remote.hitScale * 0.45);
        remote.head.scale.setScalar(1 + hitPulse * remote.hitScale * 0.9);
        remote.body.material.emissiveIntensity = hitPulse * remote.hitGlow;
        remote.head.material.emissiveIntensity = hitPulse * remote.hitGlow;
        remote.group.position.add(remote.hitKick);
        remote.healthBar.group.lookAt(camera.position);
        remote.body.position.y = -0.78 + Math.sin(remote.bob) * 0.035;
        if (remote.gun) remote.gun.position.y = -0.2 + Math.sin(remote.bob + 1) * 0.018;
      }
    }

    function drawTracer(origin, direction, length, localShot, weaponName = "pistol") {
      const weapon = WEAPON_META[weaponName] || WEAPON_META.pistol;
      const start = new THREE.Vector3(origin.x, origin.y - 0.08, origin.z);
      const end = start.clone().add(new THREE.Vector3(direction.x, direction.y, direction.z).multiplyScalar(length));
      const geometry = new THREE.BufferGeometry().setFromPoints([start, end]);
      const material = new THREE.LineBasicMaterial({
        color: new THREE.Color(weapon.color || (localShot ? 0xffe27a : 0xff7a5a)),
        transparent: true,
        opacity: weaponName === "bazooka" ? 1 : 0.92
      });
      const line = new THREE.Line(geometry, material);
      scene.add(line);
      tracers.push({ line, material, age: 0, ttl: weaponName === "sniper" ? 0.28 : weaponName === "machinegun" ? 0.11 : 0.18 });

      if (weaponName === "bazooka") {
        const orb = new THREE.Mesh(
          new THREE.SphereGeometry(0.38, 12, 12),
          new THREE.MeshBasicMaterial({ color: 0xff6b3d, transparent: true, opacity: 0.92 })
        );
        orb.position.copy(end);
        scene.add(orb);
        explosions.push({ mesh: orb, material: orb.material, age: 0, ttl: 0.22, type: "rocketTrail" });
      }
    }

    function animateTracers(dt) {
      for (let i = tracers.length - 1; i >= 0; i -= 1) {
        const tracer = tracers[i];
        tracer.age += dt;
        tracer.material.opacity = Math.max(0, 0.86 * (1 - tracer.age / tracer.ttl));

        if (tracer.age >= tracer.ttl) {
          scene.remove(tracer.line);
          tracer.line.geometry.dispose();
          tracer.material.dispose();
          tracers.splice(i, 1);
        }
      }
    }

    function spawnExplosion(explosion) {
      const group = new THREE.Group();
      group.position.set(explosion.x, explosion.y, explosion.z);

      const core = new THREE.Mesh(
        new THREE.SphereGeometry(1, 20, 20),
        new THREE.MeshBasicMaterial({ color: 0xff6b3d, transparent: true, opacity: 0.9 })
      );
      const ring = new THREE.Mesh(
        new THREE.TorusGeometry(1.2, 0.08, 8, 48),
        new THREE.MeshBasicMaterial({ color: 0xffd166, transparent: true, opacity: 0.86 })
      );
      ring.rotation.x = Math.PI / 2;
      group.add(core, ring);
      scene.add(group);
      explosions.push({ mesh: group, material: core.material, ring, age: 0, ttl: 0.62, type: "explosion", radius: explosion.radius || 10 });
    }

    function animateExplosions(dt) {
      for (let i = explosions.length - 1; i >= 0; i -= 1) {
        const explosion = explosions[i];
        explosion.age += dt;
        const pct = clamp(explosion.age / explosion.ttl, 0, 1);

        if (explosion.type === "explosion") {
          const scale = 1 + pct * explosion.radius;
          explosion.mesh.scale.setScalar(scale);
          explosion.mesh.lookAt(camera.position);
          explosion.material.opacity = Math.max(0, 0.9 * (1 - pct));
          explosion.ring.material.opacity = Math.max(0, 0.86 * (1 - pct));
        } else {
          explosion.material.opacity = Math.max(0, 0.92 * (1 - pct));
          explosion.mesh.scale.setScalar(1 + pct * 1.8);
        }

        if (explosion.age >= explosion.ttl) {
          scene.remove(explosion.mesh);
          explosion.mesh.traverse?.((node) => {
            if (node.geometry) node.geometry.dispose();
            if (node.material) node.material.dispose();
          });
          if (explosion.mesh.geometry) explosion.mesh.geometry.dispose();
          if (explosion.mesh.material) explosion.mesh.material.dispose();
          explosions.splice(i, 1);
        }
      }
    }

    function showFloatingDamage(playerId, damage, headshot) {
      const remote = remotePlayers.get(playerId) || aiEntities.get(playerId);
      if (!remote) return;

      const texture = makeDamageTexture(damage, headshot);
      const material = new THREE.SpriteMaterial({
        map: texture,
        transparent: true,
        depthTest: false,
        opacity: 1
      });
      const sprite = new THREE.Sprite(material);
      sprite.position.copy(remote.group.position);
      sprite.position.y += headshot ? 1.58 : 1.18;
      sprite.position.x += (Math.random() - 0.5) * 0.22;
      sprite.scale.set(headshot ? 1.55 : 1.1, headshot ? 0.62 : 0.44, 1);
      scene.add(sprite);

      damageNumbers.push({
        sprite,
        material,
        texture,
        velocity: new THREE.Vector3((Math.random() - 0.5) * 0.22, headshot ? 1.35 : 0.85, 0),
        age: 0,
        ttl: headshot ? 0.92 : 0.68
      });
    }

    function animateDamageNumbers(dt) {
      for (let i = damageNumbers.length - 1; i >= 0; i -= 1) {
        const number = damageNumbers[i];
        number.age += dt;
        const pct = clamp(number.age / number.ttl, 0, 1);

        number.sprite.position.add(number.velocity.clone().multiplyScalar(dt));
        number.sprite.lookAt(camera.position);
        number.material.opacity = Math.max(0, 1 - pct);
        const scalePulse = 1 + Math.sin(Math.min(1, pct * 3) * Math.PI) * 0.18;
        number.sprite.scale.multiplyScalar(scalePulse / (number.lastScalePulse || 1));
        number.lastScalePulse = scalePulse;

        if (number.age >= number.ttl) {
          scene.remove(number.sprite);
          number.sprite.material.dispose();
          number.texture.dispose();
          damageNumbers.splice(i, 1);
        }
      }
    }

    function renderPickups(snapshot) {
      const seen = new Set();
      snapshot.forEach((pickup) => {
        seen.add(pickup.id);
        let mesh = pickups.get(pickup.id);
        if (!mesh) {
          mesh = createPickup(pickup);
          pickups.set(pickup.id, mesh);
          scene.add(mesh.group);
        }

        mesh.group.position.set(pickup.position.x, pickup.position.y, pickup.position.z);
        mesh.group.rotation.y += 0.035;
        mesh.label.lookAt(camera.position);
      });

      for (const [id, pickup] of pickups) {
        if (!seen.has(id)) {
          scene.remove(pickup.group);
          pickup.group.traverse((node) => {
            if (node.geometry) node.geometry.dispose();
            if (node.material) node.material.dispose();
          });
          pickups.delete(id);
        }
      }
    }

    function createPickup(pickup) {
      const group = new THREE.Group();
      const color = new THREE.Color((WEAPON_META[pickup.weapon] || WEAPON_META.pistol).color);
      let body;
      if (pickup.type === "nuke") {
        body = new THREE.Group();
        const core = new THREE.Mesh(
          new THREE.SphereGeometry(0.55, 18, 18),
          new THREE.MeshStandardMaterial({ color: 0x222222, emissive: 0xff3d2e, emissiveIntensity: 0.32, roughness: 0.42 })
        );
        const cap = new THREE.Mesh(
          new THREE.ConeGeometry(0.32, 0.7, 16),
          new THREE.MeshStandardMaterial({ color: 0xff6b3d, roughness: 0.5 })
        );
        cap.position.y = 0.58;
        body.add(core, cap);
      } else if (pickup.type === "boost") {
        body = createBoostModel(pickup.boost);
      } else {
        body = createWeaponModel(pickup.weapon, 1.25, false);
      }
      body.position.y = 0.32;
      body.traverse((node) => {
        if (node.isMesh) node.castShadow = true;
      });
      group.add(body);

      const pad = new THREE.Mesh(
        new THREE.CylinderGeometry(0.92, 0.92, 0.08, 24),
        new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.22 })
      );
      group.add(pad);

      const label = new THREE.Sprite(new THREE.SpriteMaterial({
        map: makeLabelTexture(weaponLabel(pickup.weapon), color.getStyle()),
        transparent: true,
        depthTest: false
      }));
      label.position.y = 1.08;
      label.scale.set(2.2, 0.55, 1);
      group.add(label);

      return { group, label, weapon: pickup.weapon };
    }

    function createBoostModel(boost) {
      const group = new THREE.Group();
      const colors = {
        heal: 0x58d68d,
        armor: 0x7aa7ff,
        "speed-boost": 0xffcf5a,
        "damage-boost": 0xff6b6b,
        "jump-boost": 0xb98cff
      };
      const color = colors[boost] || 0xffffff;
      const material = new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.32, roughness: 0.45 });
      const base = new THREE.Mesh(new THREE.CylinderGeometry(0.42, 0.42, 0.18, 18), material);
      const icon = boost === "armor"
        ? new THREE.Mesh(new THREE.OctahedronGeometry(0.42, 0), material)
        : boost === "speed-boost"
          ? new THREE.Mesh(new THREE.ConeGeometry(0.34, 0.8, 16), material)
          : boost === "jump-boost"
            ? new THREE.Mesh(new THREE.TorusGeometry(0.34, 0.08, 8, 24), material)
            : new THREE.Mesh(new THREE.BoxGeometry(0.72, 0.22, 0.22), material);
      icon.position.y = 0.42;
      if (boost === "heal") {
        const vertical = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.72, 0.22), material);
        vertical.position.y = 0.42;
        group.add(vertical);
      }
      if (boost === "damage-boost") icon.rotation.z = Math.PI / 4;
      group.add(base, icon);
      return group;
    }

    function renderAi(snapshot) {
      const seen = new Set();
      snapshot.forEach((entity) => {
        seen.add(entity.id);
        let ai = aiEntities.get(entity.id);
        if (!ai) {
          ai = createAiEntity(entity);
          aiEntities.set(entity.id, ai);
          scene.add(ai.group);
        }

        ai.group.visible = entity.alive;
        ai.target.set(entity.position.x, entity.position.y, entity.position.z);
        ai.group.rotation.y = entity.yaw || 0;
        updateEntityHealth(ai, entity.hp, entity.maxHp);
        ai.label.lookAt(camera.position);
      });

      for (const [id, entity] of aiEntities) {
        if (!seen.has(id)) {
          scene.remove(entity.group);
          entity.group.traverse((node) => {
            if (node.geometry) node.geometry.dispose();
            if (node.material) node.material.dispose();
          });
          aiEntities.delete(id);
        }
      }
    }

    function createAiEntity(entity) {
      const group = new THREE.Group();
      group.position.set(entity.position.x, entity.position.y, entity.position.z);
      const isBoss = entity.type === "boss";
      const isPinata = entity.pinata;
      const color = isBoss ? 0xff3d2e : isPinata ? 0xffc94d : new THREE.Color(entity.color || "#7bff8c").getHex();
      const armorColor = isBoss ? 0x211016 : isPinata ? 0x4a3209 : 0x172533;
      const huge = isBoss || isPinata;

      const body = new THREE.Mesh(
        new THREE.CylinderGeometry(isBoss ? 1.2 : isPinata ? 0.85 : 0.42, isBoss ? 1.55 : isPinata ? 1.05 : 0.54, isBoss ? 3.2 : isPinata ? 2.15 : 1.45, huge ? 16 : 12),
        new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: huge ? 0.22 : 0.08, roughness: 0.7 })
      );
      body.position.y = isBoss ? -1.35 : isPinata ? -0.95 : -0.72;
      body.castShadow = true;
      group.add(body);

      const head = new THREE.Mesh(
        new THREE.SphereGeometry(isBoss ? 0.9 : isPinata ? 0.48 : 0.34, 16, 16),
        new THREE.MeshStandardMaterial({ color: isBoss ? 0x2b0e0e : isPinata ? 0x3d2806 : 0x17391f, emissive: color, emissiveIntensity: 0.12 })
      );
      head.position.y = isBoss ? 0.7 : isPinata ? 0.36 : 0.15;
      group.add(head);

      const armor = new THREE.Mesh(
        new THREE.BoxGeometry(isBoss ? 2.5 : isPinata ? 1.45 : 1.15, isBoss ? 1.0 : isPinata ? 0.62 : 0.5, isBoss ? 1.15 : isPinata ? 0.65 : 0.55),
        new THREE.MeshStandardMaterial({ color: armorColor, metalness: 0.18, roughness: 0.5, emissive: color, emissiveIntensity: huge ? 0.1 : 0.04 })
      );
      armor.position.y = isBoss ? -0.86 : isPinata ? -0.68 : -0.55;
      armor.castShadow = true;
      group.add(armor);

      const eyeMat = new THREE.MeshBasicMaterial({ color: isBoss ? 0xfff06a : isPinata ? 0xffffff : color });
      const eyeGeo = new THREE.BoxGeometry(isBoss ? 0.2 : isPinata ? 0.14 : 0.09, isBoss ? 0.12 : isPinata ? 0.09 : 0.06, 0.05);
      const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
      const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
      leftEye.position.set(isBoss ? -0.26 : isPinata ? -0.16 : -0.1, isBoss ? 0.82 : isPinata ? 0.48 : 0.22, isBoss ? -0.82 : isPinata ? -0.45 : -0.32);
      rightEye.position.set(isBoss ? 0.26 : isPinata ? 0.16 : 0.1, isBoss ? 0.82 : isPinata ? 0.48 : 0.22, isBoss ? -0.82 : isPinata ? -0.45 : -0.32);
      group.add(leftEye, rightEye);

      const weapon = createWeaponModel(huge ? "bazooka" : entity.name.includes("Sniper") ? "sniper" : entity.name.includes("Bomber") ? "bazooka" : "machinegun", huge ? (isBoss ? 0.82 : 0.62) : 0.42, false);
      weapon.position.set(isBoss ? 1.35 : isPinata ? 0.95 : 0.48, isBoss ? -0.8 : isPinata ? -0.55 : -0.35, isBoss ? -0.7 : isPinata ? -0.55 : -0.5);
      group.add(weapon);

      const spikeMat = new THREE.MeshStandardMaterial({ color: isBoss ? 0xffcf5a : isPinata ? 0xffec85 : color, emissive: color, emissiveIntensity: 0.16, roughness: 0.45 });
      const spikeCount = isBoss ? 7 : isPinata ? 5 : 3;
      for (let i = 0; i < spikeCount; i += 1) {
        const spike = new THREE.Mesh(
          new THREE.ConeGeometry(isBoss ? 0.16 : isPinata ? 0.12 : 0.08, isBoss ? 0.7 : isPinata ? 0.5 : 0.34, 10),
          spikeMat
        );
        spike.position.set((i - (spikeCount - 1) / 2) * (isBoss ? 0.32 : isPinata ? 0.24 : 0.18), isBoss ? 1.55 : isPinata ? 1.12 : 0.58, isBoss ? 0.05 : isPinata ? 0.04 : 0);
        spike.rotation.x = Math.PI;
        spike.castShadow = true;
        group.add(spike);
      }

      const label = new THREE.Sprite(new THREE.SpriteMaterial({
        map: makeLabelTexture(entity.name, isBoss ? "#ff6b3d" : isPinata ? "#ffd93d" : "#7bff8c"),
        transparent: true,
        depthTest: false
      }));
      label.position.y = isBoss ? 2.2 : isPinata ? 1.52 : 0.95;
      label.scale.set(isBoss ? 3.3 : isPinata ? 2.85 : 2.0, isBoss ? 0.72 : isPinata ? 0.66 : 0.48, 1);
      group.add(label);

      const healthBar = createHealthBar();
      healthBar.group.position.y = isBoss ? 1.75 : isPinata ? 1.38 : 1.22;
      group.add(healthBar.group);

      return {
        group,
        body,
        head,
        label,
        healthBar,
        target: group.position.clone(),
        bob: Math.random() * Math.PI * 2,
        hitTimer: 0,
        hitDuration: 0.18,
        hitScale: 0,
        hitGlow: 0,
        hitKick: new THREE.Vector3()
      };
    }

    function updatePickupHint() {
      let best = null;
      for (const [id, pickup] of pickups) {
        const distance = yaw.position.distanceTo(pickup.group.position);
        if (distance <= 4.4 && (!best || distance < best.distance)) {
          best = { id, weapon: pickup.weapon, distance };
        }
      }

      nearestPickup = best;
      if (!best || dead) {
        pickupHintEl.classList.remove("visible");
        return;
      }

      pickupHintEl.textContent = `Walk over — ${weaponLabel(best.weapon)}`;
      pickupHintEl.classList.add("visible");
    }

    function pickupNearest() {
      if (!nearestPickup || dead) return;
      send({ type: "pickup", id: nearestPickup.id });
    }

    function createRemotePlayer(player) {
      const group = new THREE.Group();
      group.position.set(player.position.x, player.position.y, player.position.z);

      const material = new THREE.MeshStandardMaterial({
        color: new THREE.Color(player.color),
        roughness: 0.6,
        emissive: 0xff4a34,
        emissiveIntensity: 0
      });

      const body = new THREE.Mesh(new THREE.CylinderGeometry(0.42, 0.48, 1.35, 14), material);
      body.position.y = -0.78;
      body.castShadow = true;
      group.add(body);

      const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.34, 16, 16),
        new THREE.MeshStandardMaterial({
          color: 0xffdfc7,
          roughness: 0.72,
          emissive: 0xff4a34,
          emissiveIntensity: 0
        })
      );
      head.position.y = 0.12;
      group.add(head);

      const gun = createWeaponModel(player.currentWeapon || "pistol", 0.55, false);

      return {

        weaponName: player.currentWeapon || "pistol",

        healthBar,
        target: group.position.clone(),
        bob: Math.random() * Math.PI * 2,
        hitTimer: 0,
        hitDuration: 0.18,
        hitScale: 0,
        hitGlow: 0,
        hitKick: new THREE.Vector3()
      };
    }

    function createHealthBar() {
      const group = new THREE.Group();
      const bg = new THREE.Mesh(
        new THREE.PlaneGeometry(1.18, 0.12),
        new THREE.MeshBasicMaterial({ color: 0x111820, transparent: true, opacity: 0.86, depthTest: false })
      );
      const fill = new THREE.Mesh(
        new THREE.PlaneGeometry(1.08, 0.07),
        new THREE.MeshBasicMaterial({ color: 0x58d68d, transparent: true, opacity: 0.95, depthTest: false })
      );
      fill.position.z = 0.01;
      group.add(bg);
      group.add(fill);
      return { group, fill };
    }

    function updateRemoteHealth(remote, hp) {
      const player = Array.from(playerStates.values()).find((state) => state.id !== myId && remotePlayers.get(state.id) === remote);
      const pct = clamp(hp / ((player && player.maxHp) || 100), 0, 1);
      updateEntityHealth(remote, hp, (player && player.maxHp) || 100);
    }

    function updateEntityHealth(remote, hp, maxHealth) {
      const pct = clamp(hp / (maxHealth || 100), 0, 1);
      remote.healthBar.fill.scale.x = Math.max(0.02, pct);
      remote.healthBar.fill.position.x = -0.54 + (1.08 * pct) / 2;

      if (pct > 0.6) {
        remote.healthBar.fill.material.color.setHex(0x58d68d);
      } else if (pct > 0.3) {
        remote.healthBar.fill.material.color.setHex(0xffcf5a);
      } else {
        remote.healthBar.fill.material.color.setHex(0xff6b6b);
      }
    }

    function applyHitAnimation(playerId, headshot) {
      const remote = remotePlayers.get(playerId) || aiEntities.get(playerId);
      if (!remote) return;

      remote.hitDuration = headshot ? 0.34 : 0.16;
      remote.hitTimer = remote.hitDuration;
      remote.hitScale = headshot ? 0.32 : 0.12;
      remote.hitGlow = headshot ? 1.45 : 0.65;
      remote.hitKick.set(
        (Math.random() - 0.5) * (headshot ? 0.16 : 0.06),
        headshot ? 0.1 : 0.035,
        (Math.random() - 0.5) * (headshot ? 0.16 : 0.06)
      );
    }

    function showScreenDamage(damage, headshot, mode) {
      const popup = document.createElement("div");
      popup.className = `damagePopup ${mode || "taken"}${headshot ? " headshot" : ""}`;
      popup.textContent = mode === "dealt" ? `${damage}` : `-${damage}`;
      damagePopupsEl.appendChild(popup);
      setTimeout(() => popup.remove(), 760);
    }

    function makeDamageTexture(damage, headshot) {
      const canvas = document.createElement("canvas");
      canvas.width = 180;
      canvas.height = 82;
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.font = headshot ? "900 44px Arial" : "900 34px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      ctx.strokeStyle = "rgba(0, 0, 0, 0.72)";

    function updateWeaponHud() {
      if (isGoat) {
        weaponNameEl.textContent = `GOAT tier ${goatTier}`;
        ammoEl.textContent = "1–4";
        ammoEl.style.color = "#ffd93d";
        return;
      }
      const weapon = WEAPON_META[currentWeapon] || WEAPON_META.pistol;
      weaponNameEl.textContent = weapon.name || weaponLabel(currentWeapon);
      ammoEl.textContent = currentWeapon === "pistol" ? "∞" : String(currentAmmo);
      ammoEl.style.color = weapon.color || "#ffcf5a";
      if (heldWeaponModel.userData.weapon !== currentWeapon) {
        gun.remove(heldWeaponModel);
        heldWeaponModel.traverse((node) => {
          if (node.geometry) node.geometry.dispose();
          if (node.material) node.material.dispose();
        });
        heldWeaponModel = createWeaponModel(currentWeapon, 1, true);
        heldWeaponModel.position.set(0.28, -0.24, -0.72);
        gun.add(heldWeaponModel);
      }
    }

    function createWeaponModel(weaponName, scale = 1, firstPerson = false) {
      const weapon = WEAPON_META[weaponName] || WEAPON_META.pistol;
      const color = new THREE.Color(weapon.color || "#ffe27a");
      const group = new THREE.Group();
      group.userData.weapon = weaponName;

      const dark = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.25, roughness: 0.55 });
      const accent = new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.12, metalness: 0.2, roughness: 0.45 });
      const steel = new THREE.MeshStandardMaterial({ color: 0x5f6670, metalness: 0.45, roughness: 0.32 });

      const addBox = (w, h, d, x, y, z, mat = dark) => {
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
        mesh.position.set(x, y, z);
        mesh.castShadow = true;
        group.add(mesh);
        return mesh;
      };

      const addCylinder = (r, h, x, y, z, rotX = Math.PI / 2, mat = steel) => {
        const mesh = new THREE.Mesh(new THREE.CylinderGeometry(r, r, h, 16), mat);
        mesh.rotation.x = rotX;
        mesh.position.set(x, y, z);
        mesh.castShadow = true;
        group.add(mesh);
        return mesh;
      };

      if (weaponName === "sniper") {
        addBox(0.18, 0.14, 1.45, 0, 0, -0.18, dark);
        addCylinder(0.045, 1.65, 0, 0.02, -0.45, Math.PI / 2, steel);
        addCylinder(0.11, 0.42, 0, 0.18, -0.12, Math.PI / 2, accent);
        addBox(0.12, 0.18, 0.3, 0, -0.17, 0.42, dark);
      } else if (weaponName === "shotgun") {
        addBox(0.24, 0.16, 1.1, 0, 0, -0.12, dark);
        addCylinder(0.055, 1.2, -0.07, 0.06, -0.25, Math.PI / 2, steel);
        addCylinder(0.055, 1.2, 0.07, 0.06, -0.25, Math.PI / 2, steel);
        addBox(0.18, 0.16, 0.42, 0, -0.17, 0.36, accent);
      } else if (weaponName === "machinegun") {
        addBox(0.24, 0.18, 1.0, 0, 0, -0.1, dark);
        addCylinder(0.05, 1.28, 0, 0.04, -0.35, Math.PI / 2, steel);
        addBox(0.26, 0.28, 0.2, 0, -0.24, 0.05, accent);
        addBox(0.36, 0.08, 0.24, 0, 0.18, -0.05, steel);
      } else if (weaponName === "bazooka") {
        addCylinder(0.14, 1.35, 0, 0.04, -0.18, Math.PI / 2, accent);
        addCylinder(0.2, 0.16, 0, 0.04, -0.9, Math.PI / 2, steel);
        addBox(0.16, 0.16, 0.32, 0, -0.18, 0.18, dark);
      } else {
        addBox(0.2, 0.15, 0.68, 0, 0, -0.08, dark);
        addBox(0.14, 0.18, 0.24, 0, -0.16, 0.18, accent);
        addCylinder(0.04, 0.48, 0, 0.04, -0.34, Math.PI / 2, steel);
      }

      group.scale.setScalar(scale);
      if (firstPerson) group.rotation.y = -0.04;
      return group;
    }
